<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khan Honda Service Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{font-family:Poppins;background:#f5f7fa;margin:0}
.hidden{display:none}
header{background:#0f172a;color:#fff;padding:20px;text-align:center}
nav{display:flex;justify-content:center;gap:20px;background:#111827;padding:10px}
nav a{color:#fff;text-decoration:none}
section{max-width:1100px;margin:20px auto;background:#fff;padding:20px;border-radius:10px}
input,textarea{padding:8px;margin:5px;border:1px solid #ccc;border-radius:6px}
button{padding:8px 12px;background:#0ea5e9;color:#fff;border:none;border-radius:6px;cursor:pointer}
table{width:100%;margin-top:10px;border-collapse:collapse}
th,td{padding:8px;border-bottom:1px solid #ddd}
ul{list-style:none;padding:0}
li{background:#eee;margin:5px 0;padding:8px;border-radius:6px;display:flex;justify-content:space-between}
</style>
</head>

<body>

<!-- LOGIN -->
<section id="loginSection">
<h2>Admin Login</h2>
<input id="password" type="password" placeholder="Enter Password">
<button onclick="login()">Login</button>
</section>

<div id="app" class="hidden">

<header>
<h1>Khan Honda Service Center</h1>
</header>

<nav>
<a href="#inventory">Inventory</a>
<a href="#clients">Clients</a>
<a href="#bikes">Bikes</a>
<a href="#appointments">Appointments</a>
<a href="#promotions">Promotions</a>
</nav>

<!-- INVENTORY -->
<section id="inventory">
<h2>Inventory</h2>
<input id="itemName" placeholder="Item">
<input id="itemQty" type="number" placeholder="Qty">
<button onclick="addItem()">Add</button>
<table id="inventoryTable">
<tr><th>Item</th><th>Qty</th><th>Action</th></tr>
</table>
</section>

<!-- CLIENTS -->
<section id="clients">
<h2>Clients</h2>
<input id="clientName" placeholder="Name">
<input id="service" placeholder="Service">
<input id="bill" placeholder="Bill">
<button onclick="addClient()">Add</button>
<table id="clientTable">
<tr><th>Name</th><th>Service</th><th>Bill</th><th>Action</th></tr>
</table>
</section>

<!-- BIKES -->
<section id="bikes">
<h2>Bikes</h2>
<input id="bikeName" placeholder="Bike">
<input id="bikePrice" placeholder="Price">
<button onclick="addBike()">Add</button>
<ul id="bikeList"></ul>
</section>

<!-- APPOINTMENTS -->
<section id="appointments">
<h2>Appointments</h2>
<input id="apptName" placeholder="Name">
<input id="apptDate" type="date">
<button onclick="bookAppt()">Add</button>
<ul id="apptList"></ul>
</section>

<!-- PROMOS -->
<section id="promotions">
<h2>Promotions</h2>
<textarea id="promoText"></textarea>
<button onclick="addPromo()">Add</button>
<ul id="promoList"></ul>
</section>

</div>

<script>
// ---------------- FIREBASE ----------------
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "PASTE_YOURS",
  projectId: "PASTE_YOURS",
  storageBucket: "PASTE_YOURS",
  messagingSenderId: "PASTE_YOURS",
  appId: "PASTE_YOURS"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ---------------- DOM ELEMENTS ----------------
const password = document.getElementById("password");

const itemName = document.getElementById("itemName");
const itemQty = document.getElementById("itemQty");
const inventoryTable = document.getElementById("inventoryTable");

const clientName = document.getElementById("clientName");
const service = document.getElementById("service");
const bill = document.getElementById("bill");
const clientTable = document.getElementById("clientTable");

const bikeName = document.getElementById("bikeName");
const bikePrice = document.getElementById("bikePrice");
const bikeList = document.getElementById("bikeList");

const apptName = document.getElementById("apptName");
const apptDate = document.getElementById("apptDate");
const apptList = document.getElementById("apptList");

const promoText = document.getElementById("promoText");
const promoList = document.getElementById("promoList");

// ---------------- LOGIN ----------------
function login(){
  if(password.value === "admin123"){
    document.getElementById("loginSection").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
    loadAll();
  }
}

// ---------------- LOAD ALL DATA ----------------
function loadAll(){
  loadInventory();
  loadClients();
  loadBikes();
  loadAppts();
  loadPromos();
}

// ---------------- INVENTORY ----------------
function addItem(){
  db.collection("inventory").add({
    name: itemName.value,
    qty: itemQty.value,
    time: new Date()
  });

  itemName.value = "";
  itemQty.value = "";
}

function loadInventory(){
  db.collection("inventory").onSnapshot(snapshot=>{
    inventoryTable.innerHTML = "<tr><th>Item</th><th>Qty</th><th>Action</th></tr>";

    snapshot.forEach(doc=>{
      const d = doc.data();

      let row = inventoryTable.insertRow();
      row.innerHTML = `
        <td>${d.name}</td>
        <td>${d.qty}</td>
        <td><button onclick="deleteDoc('inventory','${doc.id}')">X</button></td>
      `;
    });
  });
}

// ---------------- CLIENTS ----------------
function addClient(){
  db.collection("clients").add({
    name: clientName.value,
    service: service.value,
    bill: bill.value
  });

  clientName.value="";
  service.value="";
  bill.value="";
}

function loadClients(){
  db.collection("clients").onSnapshot(snapshot=>{
    clientTable.innerHTML = "<tr><th>Name</th><th>Service</th><th>Bill</th><th>Action</th></tr>";

    snapshot.forEach(doc=>{
      const d = doc.data();

      let row = clientTable.insertRow();
      row.innerHTML = `
        <td>${d.name}</td>
        <td>${d.service}</td>
        <td>${d.bill}</td>
        <td><button onclick="deleteDoc('clients','${doc.id}')">X</button></td>
      `;
    });
  });
}

// ---------------- BIKES ----------------
function addBike(){
  db.collection("bikes").add({
    name: bikeName.value,
    price: bikePrice.value
  });

  bikeName.value="";
  bikePrice.value="";
}

function loadBikes(){
  db.collection("bikes").onSnapshot(snapshot=>{
    bikeList.innerHTML="";

    snapshot.forEach(doc=>{
      const d=doc.data();

      let li=document.createElement("li");
      li.innerHTML=`${d.name} - ${d.price}
      <button onclick="deleteDoc('bikes','${doc.id}')">X</button>`;
      bikeList.appendChild(li);
    });
  });
}

// ---------------- APPOINTMENTS ----------------
function bookAppt(){
  db.collection("appointments").add({
    name: apptName.value,
    date: apptDate.value
  });

  apptName.value="";
  apptDate.value="";
}

function loadAppts(){
  db.collection("appointments").onSnapshot(snapshot=>{
    apptList.innerHTML="";

    snapshot.forEach(doc=>{
      const d=doc.data();

      let li=document.createElement("li");
      li.innerHTML=`${d.name} - ${d.date}
      <button onclick="deleteDoc('appointments','${doc.id}')">X</button>`;
      apptList.appendChild(li);
    });
  });
}

// ---------------- PROMOS ----------------
function addPromo(){
  db.collection("promotions").add({
    text: promoText.value
  });

  promoText.value="";
}

function loadPromos(){
  db.collection("promotions").onSnapshot(snapshot=>{
    promoList.innerHTML="";

    snapshot.forEach(doc=>{
      const d=doc.data();

      let li=document.createElement("li");
      li.innerHTML=`${d.text}
      <button onclick="deleteDoc('promotions','${doc.id}')">X</button>`;
      promoList.appendChild(li);
    });
  });
}

// ---------------- DELETE FUNCTION ----------------
function deleteDoc(collection, id){
  db.collection(collection).doc(id).delete();
}
</script>

</body>
</html>

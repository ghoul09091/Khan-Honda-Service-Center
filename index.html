<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khan Honda Service Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* LOGIN */
#loginSection{
position:fixed;
width:100%;
height:100vh;
background:#111;
display:flex;
justify-content:center;
align-items:center;
}

.loginBox{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input,select{
width:100%;
padding:10px;
margin:5px 0;
}

button{
padding:10px;
border:none;
background:#e11d48;
color:white;
cursor:pointer;
}

/* APP */
#app{display:none}

header{
background:#111;
color:white;
padding:15px;
display:flex;
gap:15px;
}

#sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:white;
transition:0.3s;
}

#sidebar a{
display:block;
padding:15px;
cursor:pointer;
}

.page{
display:none;
padding:20px;
}

.page.active{
display:block;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

/* WATERMARK */
.page::before{
content:"HONDA";
position:fixed;
font-size:120px;
color:rgba(255,0,0,0.05);
top:40%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
display:none;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginSection">
<div class="loginBox">
<h2>Login</h2>
<input id="password" type="password">
<button onclick="login()">Login</button>
<p id="errorMsg"></p>
</div>
</div>

<!-- APP -->
<div id="app">

<header>
<button onclick="toggleMenu()">☰</button>
<h3>Khan Honda System</h3>
</header>

<div id="sidebar">
<a onclick="showPage('billing')">Billing / CRM</a>
<a onclick="showPage('inventory')">Inventory</a>
<a onclick="showPage('appointments')">Appointments</a>
<a onclick="showPage('bikes')">Bikes</a>
<a onclick="showPage('promotions')">Promotions</a>
</div>

<!-- BILLING PAGE -->
<div id="billing" class="page active">

<div class="card">
<h3>Search Client</h3>
<input id="phoneSearch">
<button onclick="searchClient()">Search</button>
</div>

<div class="card">
<h3>Search Bill</h3>
<input id="billSearch">
<button onclick="searchBill()">Search</button>
</div>

<div id="historyBox" class="card" style="display:none">
<h3>History</h3>
<table id="historyTable"></table>
</div>

<div id="billingBox" class="card" style="display:none">
<h3 id="clientTitle"></h3>

<table id="billingTable">
<tr><th>Service</th><th>Qty</th><th>Price</th><th></th></tr>
</table>

<button onclick="addRow()">Add Row</button>
<h3>Total: <span id="total">0</span></h3>

<button onclick="saveBill()">Save</button>
<button onclick="printInvoice()">Print</button>
</div>

</div>

<!-- OTHER PAGES -->
<div id="inventory" class="page"><div class="card">Inventory Page</div></div>
<div id="appointments" class="page"><div class="card">Appointments Page</div></div>
<div id="bikes" class="page"><div class="card">Bikes Page</div></div>
<div id="promotions" class="page"><div class="card">Promotions Page</div></div>

<!-- POPUP -->
<div id="popup" class="popup">
<h3>Client not found</h3>
<button onclick="newClient()">Add New</button>
<button onclick="walkIn()">Walk-in</button>
</div>

<script>
const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"khan-honda-service-center.firebaseapp.com",
projectId:"khan-honda-service-center"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();

/* LOGIN */
function login(){
if(password.value==="admin123"){
loginSection.style.display="none";
app.style.display="block";
}else{
errorMsg.innerText="Wrong password";
}
}

/* MENU */
function toggleMenu(){
sidebar.style.left = sidebar.style.left==="0px" ? "-250px":"0px";
}

/* PAGE SWITCH */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

/* BILLING LOGIC (same advanced system) */

let currentClient=null;

function searchClient(){
let num=phoneSearch.value;

db.collection("clients").doc(num).get().then(doc=>{
if(doc.exists){
currentClient=doc.data();
loadHistory(num);
openBilling();
}else{
popup.style.display="block";
}
});
}

function loadHistory(phone){
historyBox.style.display="block";
historyTable.innerHTML="<tr><th>Bill</th><th>Date</th><th>Total</th></tr>";

db.collection("invoices").where("client.phone","==",phone)
.get().then(snap=>{
snap.forEach(doc=>{
let d=doc.data();
let row=historyTable.insertRow();
row.innerHTML=`
<td>${d.billNo}</td>
<td>${new Date(d.date).toLocaleString()}</td>
<td>${d.total}</td>`;
});
});
}

function searchBill(){
let id=billSearch.value;

db.collection("invoices").doc(id).get().then(doc=>{
if(doc.exists){
alert("Bill Found: "+doc.data().total);
}
});
}

function newClient(){
popup.style.display="none";
currentClient={name:"New Client",phone:phoneSearch.value};
openBilling();
}

function walkIn(){
popup.style.display="none";
currentClient={name:"Walk-in",phone:"-"};
openBilling();
}

function openBilling(){
billingBox.style.display="block";
clientTitle.innerText=currentClient.name;
billingTable.innerHTML="<tr><th>Service</th><th>Qty</th><th>Price</th><th></th></tr>";
addRow();
}

function addRow(){
let row=billingTable.insertRow();
row.innerHTML=`
<td><input></td>
<td><input type="number" value="1" onchange="calc()"></td>
<td><input type="number" onchange="calc()"></td>
<td><button onclick="this.parentElement.parentElement.remove();calc()">X</button></td>`;
}

function calc(){
let t=0;
[...billingTable.rows].slice(1).forEach(r=>{
t+= (r.cells[1].children[0].value * r.cells[2].children[0].value);
});
total.innerText=t;
}

function saveBill(){
let services=[];
[...billingTable.rows].slice(1).forEach(r=>{
services.push({
service:r.cells[0].children[0].value,
qty:r.cells[1].children[0].value,
price:r.cells[2].children[0].value
});
});

let billNo=Math.floor(100000+Math.random()*900000).toString();

db.collection("invoices").doc(billNo).set({
billNo,
client:currentClient,
services,
total:parseFloat(total.innerText),
date:new Date().toISOString()
}).then(()=>{
alert("Saved: "+billNo);
});
}

function printInvoice(){
window.print();
}
</script>

</body>
</html>

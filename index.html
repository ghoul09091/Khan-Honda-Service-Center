<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Business Website</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#0f172a;
  color:white;
}

/* NAVBAR */
nav{
  position:sticky;
  top:0;
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(10px);
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:1000;
}

nav h2{
  color:#25D366;
}

nav ul{
  display:flex;
  gap:20px;
  list-style:none;
}

nav ul li a{
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.hero h1{
  font-size:40px;
}

.hero p{
  margin-top:10px;
  color:#cbd5e1;
}

.btn{
  margin-top:20px;
  padding:12px 25px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:30px;
  cursor:pointer;
  text-decoration:none;
}

/* SECTIONS */
section{
  padding:60px 20px;
  text-align:center;
}

.services{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  width:250px;
}

/* BOOKING */
form{
  max-width:400px;
  margin:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
}

input, select{
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:12px;
  background:#25D366;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* FLOATING WHATSAPP */
.whatsapp{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px 18px;
  border-radius:50px;
  color:white;
  font-size:18px;
  text-decoration:none;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
</style>

</head>
<body>

<!-- NAV -->
<nav>
  <h2>MyBrand</h2>
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#booking">Booking</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <h1>Welcome to My Business</h1>
  <p>Book your appointment instantly via WhatsApp</p>
  <a class="btn" href="#booking">Book Now</a>
</section>

<!-- SERVICES -->
<section id="services">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Haircut</div>
    <div class="card">Beard Trim</div>
    <div class="card">Facial</div>
  </div>
</section>

<!-- BOOKING -->
<section id="booking">
  <h2>Book Appointment</h2>

  <form onsubmit="sendWhatsApp(event)">
    <input type="text" id="name" placeholder="Your Name" required>
    
    <select id="service">
      <option value="Haircut">Haircut</option>
      <option value="Beard Trim">Beard Trim</option>
      <option value="Facial">Facial</option>
    </select>

    <input type="date" id="date" required>

    <button type="submit">Send on WhatsApp</button>
  </form>
</section>

<!-- WHATSAPP FLOAT -->
<a class="whatsapp"
   href="https://wa.me/923021046816"
   target="_blank">
   💬
</a>

<script>
function sendWhatsApp(e){
  e.preventDefault();

  let name = document.getElementById("name").value;
  let service = document.getElementById("service").value;
  let date = document.getElementById("date").value;

  let message = `Hi, my name is ${name}. I want to book ${service} on ${date}.`;

  let url = `https://wa.me/923021046816?text=${encodeURIComponent(message)}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>

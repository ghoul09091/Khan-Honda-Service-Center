<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khan Honda Service Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins;background:#eef2f7}

/* LOGIN */
#loginSection{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background: linear-gradient(135deg,#0f172a,#1e293b);
}

/* GLASS BOX */
.loginBox{
  width:320px;
  padding:30px;
  border-radius:18px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 20px 40px rgba(0,0,0,0.4);

  text-align:center;
  color:white;
}

.loginBox h2{
  margin-bottom:20px;
  font-weight:600;
}

/* INPUT */
.loginBox input{
  width:100%;
  padding:12px;
  margin:10px 0;

  border-radius:10px;
  border:1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.1);
  color:white;

  outline:none;
}

.loginBox input::placeholder{
  color: rgba(255,255,255,0.6);
}

/* BUTTON */
.loginBox button{
  width:100%;
  padding:12px;
  margin-top:10px;

  border:none;
  border-radius:10px;

  background: linear-gradient(90deg,#2563eb,#1d4ed8);
  color:white;
  font-weight:600;

  cursor:pointer;
  transition:0.2s;
}

.loginBox button:hover{
  transform: scale(1.03);
}

/* ERROR */
#errorMsg{
  color:#ff4d4d;
  margin-top:10px;
  font-size:14px;
}

/* HEADER */
header{
background:#111827;color:white;padding:15px;display:flex;gap:15px;position:sticky;top:0;
}
#menuBtn{font-size:22px;cursor:pointer}

/* SIDEBAR */
#sidebar{
position:fixed;top:0;left:-270px;width:260px;height:100%;
background:#fff;box-shadow:4px 0 25px rgba(0,0,0,0.15);
transition:0.35s;z-index:1000;padding-top:20px;
}
#sidebar a{display:block;padding:14px 20px;cursor:pointer;}
#sidebar a:hover{background:#f3f4f6}

/* OVERLAY */
#overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.3);display:none;z-index:999;
}

/* PAGE SYSTEM */
.page{display:none;padding:20px}
.page.active{display:block}

/* CARD */
.card{
background:white;padding:20px;border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);margin-bottom:20px;
}

input,textarea{
padding:10px;margin:5px;width:100%;border-radius:8px;border:1px solid #ccc;
}
button{
padding:10px;border:none;background:#2563eb;color:white;border-radius:8px;cursor:pointer;margin-top:5px;
}

table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{border:1px solid #ddd;padding:8px}

/* POPUP */
.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
display:none;z-index:2000;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginSection">
  <div class="loginBox">
    <h2>🔧 Khan Honda Panel</h2>

    <input id="password" type="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>

    <p id="errorMsg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

<header>
<span id="menuBtn" onclick="openMenu()">☰</span>
<h3>Dashboard</h3>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidebar">
<a onclick="showPage('billingCRM')">💰 Billing / CRM</a>
<a onclick="showPage('inventory')">📦 Inventory</a>
<a onclick="showPage('appointments')">📅 Appointments</a>
<a onclick="showPage('bikes')">🏍 Bikes</a>
<a onclick="showPage('promotions')">🔥 Promotions</a>
</div>

<!-- BILLING + CRM (MAIN SYSTEM) -->
<div id="billingCRM" class="page active">

<div class="card">
<h3>Search Client</h3>
<input id="searchNumber" type="tel" maxlength="11" inputmode="numeric" placeholder="Enter 11 digit number">
<button onclick="searchClient()">Search</button>
</div>

<div class="card" id="billingBox" style="display:none">
<h3>Client Info</h3>
<p id="clientDisplay"></p>

<table id="serviceTable">
<tr><th>Service</th><th>Price</th></tr>
</table>

<button onclick="addRow()">➕ Add Service</button>

<p><b>Total:</b> <span id="total">0</span></p>
<button onclick="saveInvoice()">Save Invoice</button>
</div>

</div>

<!-- INVENTORY -->
<div id="inventory" class="page">
<div class="card"><h3>Inventory Module</h3></div>
</div>

<!-- APPOINTMENTS -->
<div id="appointments" class="page">
<div class="card"><h3>Appointments Module</h3></div>
</div>

<!-- BIKES -->
<div id="bikes" class="page">
<div class="card"><h3>Bikes Module</h3></div>
</div>

<!-- PROMOTIONS -->
<div id="promotions" class="page">
<div class="card"><h3>Promotions Module</h3></div>
</div>

</div>

<!-- POPUPS -->
<div id="notFoundPopup" class="popup">
<p>Client not found</p>
<button onclick="continueWithout()">Continue Without Saving</button>
</div>

<script>
const firebaseConfig = {
apiKey: "YOUR_API_KEY",
authDomain: "khan-honda-service-center.firebaseapp.com",
projectId: "khan-honda-service-center"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* LOGIN */
function login(){
  if(password.value === "admin123"){
    loginSection.classList.remove("shake");
    loginSection.style.display = "none";
    app.style.display = "block";
    showPage("billingCRM");
  } else {

    document.getElementById("errorMsg").innerText = "Invalid Password";

    // trigger shake
    loginSection.classList.remove("shake"); // reset
    void loginSection.offsetWidth; // restart animation
    loginSection.classList.add("shake");
  }
}

/* MENU */
function openMenu(){sidebar.style.left="0";overlay.style.display="block";}
function closeMenu(){sidebar.style.left="-270px";overlay.style.display="none";}

/* SAFE PAGE SYSTEM */
function showPage(id){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById(id).classList.add("active");
closeMenu();
}

/* CRM + BILLING */
let currentClient=null;

function searchClient(){
let num=searchNumber.value;

if(num.length!==11){
alert("Enter 11 digit number");
return;
}

db.collection("clients").doc(num).get().then(doc=>{
if(doc.exists){
currentClient=doc.data();
openBilling();
}else{
notFoundPopup.style.display="block";
}
});
}

function continueWithout(){
notFoundPopup.style.display="none";
currentClient={name:"Walk-in",phone:searchNumber.value};
openBilling();
}

function openBilling(){
billingBox.style.display="block";
clientDisplay.innerText=
(currentClient.name||"") + " | " + (currentClient.phone||"");
}

/* SERVICES */
function addRow(){
let row=serviceTable.insertRow();
row.innerHTML=`
<td><input class="service"></td>
<td><input type="number" class="price" oninput="calc()"></td>`;
}

function calc(){
let t=0;
document.querySelectorAll(".price").forEach(p=>{
t+=parseFloat(p.value)||0;
});
total.innerText=t;
}

/* SAVE INVOICE */
function saveInvoice(){
let services=[];

document.querySelectorAll("#serviceTable tr").forEach((tr,i)=>{
if(i===0)return;
let s=tr.querySelector(".service").value;
let p=tr.querySelector(".price").value;
if(s)services.push({s,p});
});

db.collection("invoices").add({
client:currentClient,
services,
total:total.innerText,
date:new Date().toISOString()
}).then(()=>alert("Invoice saved"));
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Khan Honda Service Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f7fa}

/* LOGIN */
#loginSection{
  padding:40px;
  text-align:center;
}

/* APP */
#app{display:none}

/* HEADER */
header{
  background:#0f172a;
  color:#fff;
  padding:15px;
  display:flex;
  align-items:center;
}

#menuBtn{
  font-size:24px;
  cursor:pointer;
  margin-right:15px;
}

/* SIDEBAR */
#sidebar{
  position:fixed;
  top:0;
  left:-260px;
  width:250px;
  height:100%;
  background:#fff;
  box-shadow:2px 0 10px rgba(0,0,0,0.3);
  transition:0.3s;
  z-index:1000;
}

#sidebar a{
  display:block;
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

#sidebar a:hover{
  background:#f1f1f1;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

/* PAGES */
.page{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* UI */
input,textarea{
  padding:8px;margin:5px;
}

button{
  padding:8px 12px;
  background:#0ea5e9;
  color:#fff;
  border:none;
}

table{width:100%;margin-top:10px}
td,th{padding:8px;border-bottom:1px solid #ddd}
li{margin:5px 0}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginSection">
  <h2>Login</h2>
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app">

<header>
  <span id="menuBtn" onclick="openMenu()">☰</span>
  <h3>Khan Honda Service</h3>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="sidebar">
  <a onclick="showPage('inventory')">Inventory</a>
  <a onclick="showPage('clients')">Clients</a>
  <a onclick="showPage('bikes')">Bikes</a>
  <a onclick="showPage('appointments')">Appointments</a>
  <a onclick="showPage('promotions')">Promotions</a>
</div>

<!-- PAGES -->

<div id="inventory" class="page">
<h2>Inventory</h2>
<input id="itemName" placeholder="Item">
<input id="itemQty" placeholder="Qty">
<button onclick="addItem()">Add</button>
<table id="inventoryTable"></table>
</div>

<div id="clients" class="page">
<h2>Clients</h2>
<input id="clientName" placeholder="Name">
<input id="service" placeholder="Service">
<input id="bill" placeholder="Bill">
<button onclick="addClient()">Add</button>
<table id="clientTable"></table>
</div>

<div id="bikes" class="page">
<h2>Bikes</h2>
<input id="bikeName" placeholder="Bike">
<input id="bikePrice" placeholder="Price">
<button onclick="addBike()">Add</button>
<ul id="bikeList"></ul>
</div>

<div id="appointments" class="page">
<h2>Appointments</h2>
<input id="apptName" placeholder="Name">
<input id="apptDate" type="date">
<button onclick="bookAppt()">Add</button>
<ul id="apptList"></ul>
</div>

<div id="promotions" class="page">
<h2>Promotions</h2>
<textarea id="promoText"></textarea>
<button onclick="addPromo()">Add</button>
<ul id="promoList"></ul>
</div>

</div>

<script>
// FIREBASE
const firebaseConfig = {
 apiKey: "AIza...",
 authDomain: "khan-honda-service-center.firebaseapp.com",
 projectId: "khan-honda-service-center",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// LOGIN
function login(){
  if(document.getElementById("password").value==="admin123"){
    document.getElementById("loginSection").style.display="none";
    document.getElementById("app").style.display="block";
    showPage("inventory");
    loadAll();
  }
}

// MENU
function openMenu(){
  document.getElementById("sidebar").style.left="0";
  document.getElementById("overlay").style.display="block";
}

function closeMenu(){
  document.getElementById("sidebar").style.left="-260px";
  document.getElementById("overlay").style.display="none";
}

// PAGE SWITCH
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  closeMenu();
}

// LOAD ALL
function loadAll(){
  loadInventory();
  loadClients();
  loadBikes();
  loadAppts();
  loadPromos();
}

// INVENTORY
function addItem(){
  db.collection("inventory").add({
    name:itemName.value, qty:itemQty.value
  });
  itemName.value=""; itemQty.value="";
}

function loadInventory(){
  db.collection("inventory").onSnapshot(s=>{
    inventoryTable.innerHTML="<tr><th>Item</th><th>Qty</th></tr>";
    s.forEach(doc=>{
      let d=doc.data();
      inventoryTable.innerHTML+=`<tr><td>${d.name}</td><td>${d.qty}</td></tr>`;
    });
  });
}

// CLIENTS
function addClient(){
  db.collection("clients").add({
    name:clientName.value, service:service.value, bill:bill.value
  });
}

function loadClients(){
  db.collection("clients").onSnapshot(s=>{
    clientTable.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();
      clientTable.innerHTML+=`<tr><td>${d.name}</td><td>${d.service}</td><td>${d.bill}</td></tr>`;
    });
  });
}

// BIKES
function addBike(){
  db.collection("bikes").add({
    name:bikeName.value, price:bikePrice.value
  });
}

function loadBikes(){
  db.collection("bikes").onSnapshot(s=>{
    bikeList.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();
      bikeList.innerHTML+=`<li>${d.name} - ${d.price}</li>`;
    });
  });
}

// APPOINTMENTS
function bookAppt(){
  db.collection("appointments").add({
    name:apptName.value, date:apptDate.value
  });
}

function loadAppts(){
  db.collection("appointments").onSnapshot(s=>{
    apptList.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();
      apptList.innerHTML+=`<li>${d.name} - ${d.date}</li>`;
    });
  });
}

// PROMOS
function addPromo(){
  db.collection("promotions").add({
    text:promoText.value
  });
}

function loadPromos(){
  db.collection("promotions").onSnapshot(s=>{
    promoList.innerHTML="";
    s.forEach(doc=>{
      let d=doc.data();
      promoList.innerHTML+=`<li>${d.text}</li>`;
    });
  });
}
</script>

</body>
</html>
